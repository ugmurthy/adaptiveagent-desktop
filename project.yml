name: AdaptiveAgentDesktop
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.adaptiveagent.desktop
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
targets:
  AdaptiveAgentDesktop:
    type: application
    platform: macOS
    sources:
      - Sources/AdaptiveAgentDesktop
    resources:
      - path: Resources/AgentRuntime
        type: folder
    settings:
      base:
        PRODUCT_NAME: AdaptiveAgentDesktop
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AdaptiveAgent Desktop
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_IDENTITY: "-"
    scheme:
      testTargets:
        - AdaptiveAgentDesktopTests
  AdaptiveAgentDesktopTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/AdaptiveAgentDesktopTests
    dependencies:
      - target: AdaptiveAgentDesktop
